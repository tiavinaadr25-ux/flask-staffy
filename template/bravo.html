<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staffly — Connecté !</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-main: #2563EB;
      --navy: #132D6B;
      --blue-pale: #EFF6FF;
      --blue-light: #DDEAFD;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-pale);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      border: 1.5px solid var(--blue-light);
      text-align: center;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 12px;
    }

    p {
      color: #5a6a85;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    a {
      display: inline-block;
      background: var(--blue-main);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 13px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    a:hover { background: var(--navy); }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🎉</div>
    <h1>Bravo, tu es connecté !</h1>
    <p>Bienvenue sur Staffly.<br />Ton espace manager est prêt.</p>
    <a href="/">← Retour à la connexion</a>
  </div>

</body>
</html>
