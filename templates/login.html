{% extends "base.html" %}

{% block title %}Staffly | Manager Login{% endblock %}

{% block content %}
  <section class="form-section">
    <div class="container form-wrapper">
      <div class="card form-card">
        <p class="eyebrow">Secure access</p>
        <h1>Manager login</h1>
        <p class="form-intro">
          Sign in to access your team dashboard and manage restaurant operations.
        </p>

        <form method="POST" class="form-layout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="manager@staffly.com" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter your password" required />

          <button class="button button-primary" type="submit">Sign in</button>
        </form>

        <div class="form-help">
          <p>Demo account:</p>
          <code>manager@staffly.com / Staffly123!</code>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
