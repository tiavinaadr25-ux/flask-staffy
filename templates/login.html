<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staffly — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-main: #2563EB;
      --navy: #132D6B;
      --blue-pale: #EFF6FF;
      --blue-light: #DDEAFD;
      --text-muted: #5a6a85;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blue-pale);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      border: 1.5px solid var(--blue-light);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4D7FF5, #2563EB);
      border-radius: 9px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      color: var(--navy);
    }

    .logo-accent { color: var(--blue-main); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      color: var(--navy);
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--navy);
    }

    input {
      padding: 12px 14px;
      border: 1.5px solid var(--blue-light);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--blue-main); }

    .erreur {
      background: #FEE2E2;
      color: #DC2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 13px;
      background: var(--blue-main);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: var(--navy); }
  </style>
</head>
<body>

  <div class="card">

    <div class="logo">
      <div class="logo-icon">S</div>
      <span class="logo-text"><strong>Staff</strong><span class="logo-accent">ly</span></span>
    </div>

    <h1>Bienvenue 👋</h1>
    <p class="subtitle">Connectez-vous à votre espace manager</p>

    {% if erreur %}
    <div class="erreur">{{ erreur }}</div>
    {% endif %}

    <form method="POST" action="/connexion">

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="manager@staffly.com" required />
      </div>

      <div class="form-group">
        <label for="mdp">Mot de passe</label>
        <input type="password" id="mdp" name="mdp" placeholder="••••••••" required />
      </div>

      <button type="submit">Se connecter</button>

    </form>

  </div>

</body>
</html>
