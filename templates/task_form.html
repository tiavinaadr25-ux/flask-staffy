{% extends "base.html" %}

{% block title %}{% if task %}Edit task{% else %}Add task{% endif %} | Staffly{% endblock %}

{% block content %}
  <section class="form-section">
    <div class="container form-wrapper">
      <div class="card form-card">
        <p class="eyebrow">Task management</p>
        <h1>{% if task %}Edit task{% else %}Add task{% endif %}</h1>

        <form method="POST" class="form-layout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

          <label for="title">Title</label>
          <input id="title" name="title" type="text" value="{{ task.title if task else '' }}" required />

          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4">{{ task.description if task else '' }}</textarea>

          <label for="employee_id">Assigned employee</label>
          <select id="employee_id" name="employee_id">
            <option value="">No employee</option>
            {% set selected_employee_id = task.employee_id if task else None %}
            {% for employee in employees %}
              <option value="{{ employee.id }}" {% if selected_employee_id == employee.id %}selected{% endif %}>
                {{ employee.full_name }}
              </option>
            {% endfor %}
          </select>

          <label for="status">Status</label>
          {% set current_status = task.status if task else 'todo' %}
          <select id="status" name="status">
            <option value="todo" {% if current_status == 'todo' %}selected{% endif %}>todo</option>
            <option value="in_progress" {% if current_status == 'in_progress' %}selected{% endif %}>in_progress</option>
            <option value="done" {% if current_status == 'done' %}selected{% endif %}>done</option>
          </select>

          <label for="due_date">Due date</label>
          <input id="due_date" name="due_date" type="date" value="{{ task.due_date.isoformat() if task and task.due_date else '' }}" />

          <button class="button button-primary" type="submit">Save task</button>
        </form>
      </div>
    </div>
  </section>
{% endblock %}
