{% extends "base.html" %}

{% block title %}Staffly | Créer un compte{% endblock %}

{% block content %}
  <section class="auth-section">
    <div class="container auth-wrapper">
      <div class="card auth-card">
        <div class="steps-header auth-header">
          <h1 class="section-title">Créer un compte manager</h1>
          <p class="section-subtitle">
            Ouvrez votre espace Staffly et accédez directement au dashboard.
          </p>
        </div>

        <form method="POST" class="auth-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

          <div class="form-group">
            <label for="full_name">Nom complet</label>
            <input id="full_name" name="full_name" type="text" placeholder="Ex : Tiavina Rakoto" required />
          </div>

          <div class="form-group">
            <label for="restaurant_name">Nom de l'établissement</label>
            <input id="restaurant_name" name="restaurant_name" type="text" placeholder="Ex : Staffly Bistro" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="manager@staffly.com" required />
          </div>

          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" placeholder="8 caractères minimum" required />
          </div>

          <div class="form-group">
            <label for="password_confirmation">Confirmer le mot de passe</label>
            <input
              id="password_confirmation"
              name="password_confirmation"
              type="password"
              placeholder="Retapez votre mot de passe"
              required
            />
          </div>

          <button class="btn-primary auth-submit" type="submit">Créer mon compte</button>
        </form>

        <div class="auth-switch">
          <p>Déjà inscrit ?</p>
          <a href="{{ url_for('login') }}">Se connecter</a>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
